{% extends 'accounts/base.html' %}
{% block title %}Post a New Job – SOORTI Denimkind{% endblock %}

{% block content %}
<section class="section">
  <div class="container container-narrow">
    <div class="page-header">
      <a href="{% url 'admin_dashboard' %}" class="back-link">← Back to Admin Dashboard</a>
      <h1>Post a New Job</h1>
      <p class="text-muted">Create a new job opening for candidates to apply.</p>
    </div>

    <div class="form-card">
      <form method="post" novalidate>
        {% csrf_token %}

        <div class="field-group">
          <label for="title">Job Title *</label>
          <input type="text" id="title" name="title" required placeholder="e.g. Senior Software Engineer">
        </div>

        <div class="field-group">
          <label for="department">Department *</label>
          <input type="text" id="department" name="department" required placeholder="e.g. Engineering">
        </div>

        <div class="field-row">
          <div class="field-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" value="Remote" placeholder="e.g. Remote, New York">
          </div>
          <div class="field-group">
            <label for="job_type">Job Type</label>
            <select id="job_type" name="job_type">
              <option value="Full-time">Full-time</option>
              <option value="Part-time">Part-time</option>
              <option value="Contract">Contract</option>
              <option value="Internship">Internship</option>
            </select>
          </div>
        </div>

        <div class="field-group">
          <label for="description">Job Description *</label>
          <textarea id="description" name="description" required placeholder="Describe the role, responsibilities, and team…"></textarea>
        </div>

        <div class="field-group">
          <label for="requirements">Requirements *</label>
          <textarea id="requirements" name="requirements" required placeholder="List key qualifications, technical skills, and experience required…"></textarea>
        </div>

        <div class="form-actions">
          <a href="{% url 'admin_dashboard' %}" class="btn btn-ghost">Cancel</a>
          <button type="submit" class="btn btn-primary">Post Job</button>
        </div>
      </form>
    </div>

  </div>
</section>
{% endblock %}
